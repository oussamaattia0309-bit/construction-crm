{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1>Projects</h1>
    
    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Client</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for project in projects %}
            <tr>
                <td>{{ project.name }}</td>
                <td>{{ project.client_name or 'N/A' }}</td>
                <td>{{ project.status }}</td>
                <td>
                    <a href="{{ url_for('project_detail', id=project.id) }}" class="btn btn-sm btn-primary">View</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
