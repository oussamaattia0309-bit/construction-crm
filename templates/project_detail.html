{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1>Project Details</h1>
    
    <form method="POST" action="/projects/{{ project.id }}">
        <div class="mb-3">
            <label class="form-label">Project Name</label>
            <input type="text" name="name" class="form-control" value="{{ project.name }}">
        </div>
        
        <div class="mb-3">
            <label class="form-label">Client Name</label>
            <input type="text" name="client_name" class="form-control" value="{{ project.client_name or '' }}">
        </div>
        
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-control">
                <option value="planned" {{ 'selected' if project.status == 'planned' }}>Planned</option>
                <option value="in_progress" {{ 'selected' if project.status == 'in_progress' }}>In Progress</option>
                <option value="completed" {{ 'selected' if project.status == 'completed' }}>Completed</option>
            </select>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Prix de Vente (TND)</label>
            <input type="number" name="selling_price" class="form-control" value="{{ project.selling_price or 0 }}" step="0.01">
        </div>
        
        <div class="mb-3">
            <label class="form-label">Acompte (TND)</label>
            <input type="number" name="client_receipts" class="form-control" value="{{ project.client_receipts or 0 }}" step="0.01">
        </div>
        
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('projects') }}" class="btn btn-secondary">Back to Projects</a>
    </form>
</div>
{% endblock %}
